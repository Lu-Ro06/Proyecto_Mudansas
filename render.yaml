services:
  # Web service para el backend en Node.js
  - type: web
    name: mudanzas-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DB_HOST
        value: TU_HOST_AQUI
      - key: DB_USER
        value: TU_USUARIO_AQUI
      - key: DB_PASSWORD
        value: TU_PASSWORD_AQUI
      - key: DB_NAME
        value: mudanzas_mi_hogar
      # Render automáticamente proporciona la variable de entorno PORT.

  # Static site para el frontend en React (Vite)
  - type: web
    name: mudanzas-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mudanzas-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
